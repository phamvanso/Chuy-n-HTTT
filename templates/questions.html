<!DOCTYPE html>
<html lang="vi-VN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Câu hỏi trắc nghiệm được tạo</title>
    <script>

        // score: tổng điểm hiện tại (mỗi câu đúng +10)
        let score = 0;
        // currentQuestionIndex: vị trí câu đang hiển thị trong mảng questions (bắt đầu từ 0)
        let currentQuestionIndex = 0;
        // userAnswers: lưu lịch sử trả lời để dùng khi render trang kết quả cuối
        // Mỗi phần tử có dạng: { selectedOption, correctAnswer, isCorrect }
        let userAnswers = [];
        // isAnswering: khóa tạm thời để chống click liên tục trong lúc đang chấm câu hiện tại
        let isAnswering = false;

        // totalQuestions: tổng số câu trắc nghiệm
        const totalQuestions = {{ mcqs|length }};
        // questions: dữ liệu câu hỏi dạng JSON, mỗi phần tử thường là:
        // [questionNumber, [stem, choices[], correctAnswerLetter]]
        const questions = {{ mcqs|tojson|safe }};
        
        // trả app về trạng thái "chưa làm bài"
        function resetQuiz() {
            score = 0;
            currentQuestionIndex = 0;
            userAnswers = [];
            isAnswering = false;
            
            // Cập nhật lại scoreboard và đảm bảo nó được hiển thị
            const scoreDisplay = document.getElementById('score');
            if (scoreDisplay) {
                scoreDisplay.style.display = 'block';
                scoreDisplay.textContent = `Điểm: 0/${totalQuestions * 10}`;
            }
            
            // Render lại từ câu đầu tiên rồi cuộn lên đầu trang cho trải nghiệm mượt
            displayQuestion(0);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        document.addEventListener('DOMContentLoaded', function () {
            // Các phần tử DOM chính được dùng trong toàn bộ luồng quiz
            const questionContainer = document.querySelector('.question-container');
            const scoreDisplay = document.getElementById('score');

            // Không có dữ liệu thì báo lỗi thân thiện cho người dùng
            if (totalQuestions === 0) {
                questionContainer.innerHTML = '<p style="text-align:center; color:red; font-size:1.5rem;">Không tạo được câu hỏi nào. Hãy thử file tiếng Anh dài hơn!</p>';
                return;
            }

            // Render 1 câu hỏi theo index hiện tại
            // - Nếu hết câu: chuyển sang màn hình kết quả
            // - Nếu còn: dựng HTML động cho câu hỏi và 4 đáp án
            function displayQuestion(index) {
                if (index >= totalQuestions) {
                    displayResults();
                    hideScore();
                    return;
                }

                const question = questions[index];
                const questionNumber = question[0];          // số thứ tự hiển thị cho người dùng (1,2,3...)
                const stem = question[1][0];                  // nội dung câu hỏi (phần thân)
                const choices = question[1][1];               // danh sách đáp án, dự kiến 4 lựa chọn
                const correctAnswer = question[1][2];         // đáp án đúng: 'A' | 'B' | 'C' | 'D'

                questionContainer.innerHTML = `
                    <div class="quiz-cards">
                        <div class="contents">
                            <span class="question-number">Câu ${questionNumber} / ${totalQuestions}</span>
                            <p class="question-text">${stem}</p>
                            <ol class="numbered-list">
                                ${choices.map((option, i) => `
                                    <div class="btn-container">
                                        <button class="answer-btn"
                                                data-option="${String.fromCharCode(65 + i)}"
                                                data-correct-answer="${correctAnswer}">
                                            <!-- Gán data-* để xử lý logic đúng/sai ở event click -->
                                            ${String.fromCharCode(65 + i)}. ${option}
                                        </button>
                                    </div>
                                `).join('')}
                            </ol>
                        </div>
                    </div>
                `;
            }

            // KẾT QUẢ CUỐI BÀI
            // - Tính đúng/sai, phần trăm
            // - Quy đổi sang bậc xếp loại + thông điệp động
            // - Render lại toàn bộ câu để người học tự so đáp án
            function displayResults() {
                const correctCount = userAnswers.filter(a => a.isCorrect).length;
                const incorrectCount = totalQuestions - correctCount;
                const percentageScore = (correctCount / totalQuestions) * 100;
                // Làm tròn đến 1 chữ số thập phân
                const finalScore = Math.round(percentageScore * 10) / 10;
                
                let gradeClass = '';
                let gradeText = '';
                let message = '';
                
                if (percentageScore === 100) {
                    gradeClass = 'grade-perfect';
                    gradeText = 'S';
                    message = "Hoàn hảo! Bạn là thiên tài!";
                } else if (percentageScore >= 90) {
                    gradeClass = 'grade-excellent';
                    gradeText = 'A+';
                    message = "Xuất sắc! Kiến thức vững vàng!";
                } else if (percentageScore >= 80) {
                    gradeClass = 'grade-good';
                    gradeText = 'A';
                    message = "Rất tốt! Tiếp tục phát huy!";
                } else if (percentageScore >= 70) {
                    gradeClass = 'grade-fair';
                    gradeText = 'B';
                    message = "Khá tốt! Cố gắng thêm nhé!";
                } else if (percentageScore >= 60) {
                    gradeClass = 'grade-pass';
                    gradeText = 'C';
                    message = "Đạt yêu cầu. Hãy ôn tập thêm!";
                } else {
                    gradeClass = 'grade-fail';
                    gradeText = 'D';
                    message = "Cần cố gắng hơn. Đừng bỏ cuộc!";
                }
                
                let resultsHTML = `
                    <div class="results-summary">
                        <p class="scoretext">Kết quả bài kiểm tra</p>
                        <div class="grade-circle ${gradeClass}">
                            <span class="grade-letter">${gradeText}</span>
                            <span class="grade-percent">${finalScore}%</span>
                        </div>
                        <div class="score-breakdown">
                            <div class="score-item">
                                <span class="score-label">Số câu đúng</span>
                                <span class="score-value correct">${correctCount}</span>
                            </div>
                            <div class="score-item">
                                <span class="score-label">Số câu sai</span>
                                <span class="score-value incorrect">${incorrectCount}</span>
                            </div>
                            <div class="score-item">
                                <span class="score-label">Tổng số câu</span>
                                <span class="score-value">${totalQuestions}</span>
                            </div>
                            <div class="score-item">
                                <span class="score-label">Điểm số</span>
                                <span class="score-value">${correctCount * 10}/${totalQuestions * 10}</span>
                            </div>
                        </div>
                        <p class="result-message">${message}</p>
                    </div>
                    <div class="results-container">
                `;

                // Duyệt theo thứ tự người dùng đã làm để tạo phần review từng câu
                userAnswers.forEach((answer, index) => {
                    const question = questions[index];
                    const stem = question[1][0];
                    const choices = question[1][1];
                    const correctAnswer = question[1][2];
                    const statusIcon = answer.isCorrect ? '[Đúng]' : '[Sai]';

                    resultsHTML += `
                        <div class="quiz-cards ${answer.isCorrect ? 'card-correct' : 'card-incorrect'}">
                            <div class="contents">
                                <span class="question-number">${statusIcon} Câu ${index + 1}</span>
                                <p class="question-text">${stem}</p>
                                <ol class="numbered-list">
                                    ${choices.map((option, i) => {
                                        const letter = String.fromCharCode(65 + i);
                                        let className = '';
                                        // Tô xanh đáp án đúng
                                        if (letter === correctAnswer) {
                                            className = 'correct';
                                        // Nếu làm sai thì tô đỏ lựa chọn sai của người dùng
                                        } else if (answer.selectedOption === letter && !answer.isCorrect) {
                                            className = 'incorrect';
                                        }
                                        return `
                                            <div class="btn-container">
                                                <button class="answer-btn ${className}" disabled>
                                                    ${letter}. ${option}
                                                </button>
                                            </div>
                                        `;
                                    }).join('')}
                                </ol>
                            </div>
                        </div>
                    `;
                });

                resultsHTML += `</div>`;
                // Ghi đè toàn bộ vùng câu hỏi bằng giao diện kết quả cuối
                questionContainer.innerHTML = resultsHTML;
            }

            // Ẩn bảng điểm khi đã sang màn hình kết quả
            function hideScore() {
                if (scoreDisplay) scoreDisplay.style.display = 'none';
            }

            // Gán hàm displayQuestion ra global để resetQuiz có thể gọi
            window.displayQuestion = displayQuestion;
            
            // Bắt đầu hiển thị câu đầu tiên
            displayQuestion(currentQuestionIndex);
            
            // Bắt sự kiện chọn đáp án (event delegation để không cần gán từng nút)
            questionContainer.addEventListener('click', function(event) {
                const btn = event.target.closest('.answer-btn');
                if (!btn || isAnswering) return;
                
                // Ngăn click nhiều lần trong một câu (chống cộng điểm sai)
                isAnswering = true;
                
                // Khóa toàn bộ nút đáp án ngay khi đã chọn 1 đáp án
                const allBtns = questionContainer.querySelectorAll('.answer-btn');
                allBtns.forEach(b => b.disabled = true);
                
                // Lấy dữ liệu lựa chọn người dùng và đáp án đúng từ data-attribute
                const selectedOption = btn.dataset.option;
                const correctAnswer = btn.dataset.correctAnswer;
                const isCorrect = selectedOption === correctAnswer;

                // Lưu kết quả câu hiện tại để phục vụ phần tổng kết cuối
                userAnswers.push({
                    selectedOption,
                    correctAnswer,
                    isCorrect
                });

                if (isCorrect) {
                    // Trả lời đúng: tô xanh nút chọn + cộng điểm
                    btn.classList.add('correct');
                    score += 10;
                } else {
                    // Trả lời sai: tô đỏ nút chọn
                    btn.classList.add('incorrect');
                    // Hiển thị đáp án đúng
                    allBtns.forEach(b => {
                        if (b.dataset.option === correctAnswer) {
                            b.classList.add('correct');
                        }
                    });
                }

                if (scoreDisplay) {
                    // Cập nhật điểm theo thời gian thực sau mỗi câu
                    scoreDisplay.textContent = `Điểm: ${score}/${totalQuestions * 10}`;
                }

                // Chờ 1.5s để người dùng thấy phản hồi đúng/sai rồi chuyển câu tiếp theo
                setTimeout(() => {
                    // Mở khóa click cho câu mới
                    isAnswering = false;
                    // Tăng index để sang câu tiếp theo
                    currentQuestionIndex++;
                    displayQuestion(currentQuestionIndex);
                }, 1500);
            });
        });
    </script>
</head>
<body>
    <!-- Khung chính hiển thị tiêu đề, điểm, cảnh báo và nội dung câu hỏi -->
    <div class="quizquestions">
        <div class="texttop-container">
            <div class="texttopsecond-container">
                <h1>Câu hỏi được tạo</h1>
                <!-- Chỉ hiện scoreboard khi backend có danh sách câu hỏi -->
                {% if mcqs and mcqs|length > 0 %}
                    <div id="score">Điểm: 0/{{ mcqs|length * 10 }}</div>
                {% endif %}
            </div>
            <!-- Banner cảnh báo tùy chọn từ backend (ví dụ file ngắn/chưa tối ưu) -->
            {% if warning_message %}
            <div class="warning-banner" style="background: #fef3c7; color: #92400e; padding: 12px 20px; border-radius: 10px; margin-top: 15px; max-width: 500px; text-align: center; font-weight: 500;">
                {{ warning_message }}
            </div>
            {% endif %}
        </div>
        <div class="question-container">
            <!-- Vùng render động: câu hỏi từng bước hoặc trang kết quả cuối -->
        </div>
        <!-- Fallback hiển thị phía server nếu không có câu hỏi -->
        {% if not mcqs or mcqs|length == 0 %}
            <p style="text-align:center; color:red; font-size:1.5rem;">Không tạo được câu hỏi. Hãy thử file dài hơn!</p>
        {% endif %}
    </div>
    <!-- Nhóm nút điều hướng nhanh sau khi làm bài -->
    <div class="return-container">
        <a class="btn-back" href="/">Trang chủ</a>
        <button class="btn-retry" onclick="resetQuiz()">Làm lại</button>
        <a class="btn-new" href="/upload_page">File mới</a>
    </div>
</body>
</html>
